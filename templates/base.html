<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Damn Vulnerable AI Agent{% endblock %}</title>
    {% set favicon_emoji = "🤖" %}
    {% if site == 'bullseye' %}{% set favicon_emoji = "🎯" %}
    {% elif site == 'dividedhazard' %}{% set favicon_emoji = "🩺" %}
    {% elif site == 'idlethat' %}{% set favicon_emoji = "👻" %}{% endif %}
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>{{ favicon_emoji }}</text></svg>">
    <!-- HTMX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
    <style>
        /* General resets */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
