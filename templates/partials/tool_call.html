<div class="message tool-call">
    <details>
        <summary>🔧 Tool Call: {{ item.name }}</summary>
        <div class="tool-args"><strong>Arguments:</strong> <code>{{ item.arguments }}</code></div>
        <div class="tool-result"><strong>Result:</strong> <pre>{{ item.content }}</pre></div>
    </details>
</div>
