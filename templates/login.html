{% extends "base.html" %}

{% block title %}Login - {{ site | capitalize }}{% endblock %}

{% block head %}
<style>
    body {
        background-color: #f7f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .auth-card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }
    h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #333;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        padding: 0.75rem;
        color: white;
        background: #007bff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover {
        background: #0056b3;
    }
    .error {
        color: #d9534f;
        background: #f2dede;
        border: 1px solid #ebccd1;
        padding: 0.75rem;
        border-radius: 4px;
        margin-bottom: 1rem;
    }
    /* Simple tabs */
    .tabs {
        display: flex;
        border-bottom: 1px solid #ddd;
        margin-bottom: 1.5rem;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 0.5rem;
        cursor: pointer;
        color: #666;
    }
    .tab.active {
        border-bottom: 2px solid #007bff;
        font-weight: bold;
        color: #007bff;
    }
    .tab-content {
        display: none;
    }
    .tab-content.active {
        display: block;
    }
</style>
<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('content-' + tab).classList.add('active');
    }
</script>
{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>{{ site | capitalize }}</h1>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="tabs">
        <div id="tab-login" class="tab active" onclick="switchTab('login')">Login</div>
        <div id="tab-signup" class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="content-login" class="tab-content active">
        <form method="POST" action="/{{ site }}/login">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
    </div>

    <div id="content-signup" class="tab-content">
        <form method="POST" action="/{{ site }}/signup">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" style="background:#28a745;">Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}
